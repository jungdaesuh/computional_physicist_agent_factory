name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      run: |
        uv pip install --system .

    - name: Run Ruff Check
      run: |
        ruff check .

    - name: Run MyPy strict check
      run: |
        mypy --strict factory/

    - name: Run Import Linter
      run: |
        import-linter lint --config pyproject.toml

    - name: Run Pytest
      run: |
        pytest -m "not live"
